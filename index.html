<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Sizing Tool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:44px 40px;width:380px;text-align:center;box-shadow:0 25px 60px #00000070}
.logo{font-size:52px;margin-bottom:18px}
h2{color:#fff;font-size:21px;font-weight:700;margin-bottom:6px}
p{color:#64748b;font-size:13px;margin-bottom:28px}
input{width:100%;padding:12px 16px;background:#0f172a;border:1.5px solid #334155;border-radius:8px;color:#fff;font-size:15px;text-align:center;letter-spacing:3px;outline:none;transition:border .15s;margin-bottom:12px}
input:focus{border-color:#16a34a;box-shadow:0 0 0 3px #16a34a18}
button{width:100%;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s}
button:hover{background:#15803d}
button:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.err{color:#ef4444;font-size:12px;margin-top:10px;min-height:18px}
.hint{color:#334155;font-size:11px;margin-top:20px}
#progress{display:none;margin-top:14px}
.bar-bg{background:#0f172a;border-radius:4px;height:6px;overflow:hidden}
.bar-fill{background:#16a34a;height:100%;width:0;transition:width .3s;border-radius:4px}
.bar-label{color:#64748b;font-size:11px;margin-top:6px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚙</div>
  <h2>Line Sizing Tool</h2>
  <p>Nhập mật khẩu để truy cập công cụ tính toán đường ống</p>
  <input type="password" id="pw" placeholder="••••••••" autofocus onkeydown="if(event.key==='Enter')unlock()">
  <button id="btn" onclick="unlock()">Truy cập</button>
  <div class="err" id="err"></div>
  <div id="progress">
    <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
    <div class="bar-label" id="bar-label">Đang giải mã...</div>
  </div>
  <div class="hint">Liên hệ quản trị viên nếu quên mật khẩu</div>
</div>

async function unlock() {
  const pw = document.getElementById('pw').value;
  if (!pw) { document.getElementById('err').textContent = 'Vui lòng nhập mật khẩu.'; return; }

  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Đang xử lý...';
  document.getElementById('err').textContent = '';
  document.getElementById('progress').style.display = 'block';
  setBar(10, 'Đang tạo khóa...');

  try {
    // Small delay so UI can update before heavy PBKDF2
    await new Promise(r => setTimeout(r, 20));

    const raw = Uint8Array.from(atob(PAYLOAD), c => c.charCodeAt(0));
    const salt = raw.slice(0, 16);
    const iv   = raw.slice(16, 28);
    const tag  = raw.slice(28, 44);
    const data = raw.slice(44);

    // Derive key
    const keyMat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    setBar(40, 'Đang dẫn xuất khóa...');
    await new Promise(r => setTimeout(r, 10));

    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' },
      keyMat, { name:'AES-GCM', length:256 }, false, ['decrypt']
    );
    setBar(70, 'Đang giải mã nội dung...');
    await new Promise(r => setTimeout(r, 10));

    // Ciphertext = data || tag for SubtleCrypto (it expects tag appended)
    const cipherWithTag = new Uint8Array(data.length + tag.length);
    cipherWithTag.set(data); cipherWithTag.set(tag, data.length);

    const decrypted = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, cipherWithTag);
    setBar(95, 'Đang tải tool...');
    await new Promise(r => setTimeout(r, 50));

    const html = new TextDecoder().decode(decrypted);
    document.open(); document.write(html); document.close();
  } catch(e) {
    document.getElementById('err').textContent = 'Mật khẩu không đúng hoặc tệp bị lỗi.';
    document.getElementById('progress').style.display = 'none';
    btn.disabled = false; btn.textContent = 'Truy cập';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

function setBar(pct, label) {
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('bar-label').textContent = label;
}
</script>
